<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/request-details.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <title>LearnLand-Learn</title>
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="title">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-circle-dollar-sign-icon lucide-circle-dollar-sign">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" />
                    <path d="M12 18V6" />
                </svg>
                <h2>Request Details</h2>

            </div>
            <div class="state">
                <span> state </span>
            </div>
        </div>

        <div class="inputs">
            <div class="input">
                <span>Request ID</span>
                <span>#REQ-48291</span>
            </div>

            <div class="input">
                <span>Course</span>
                <span>Web Developement</span>
            </div>
            <div class="input">
                <span>Teacher</span>
                <span>Dr.Mahmmoudi</span>
            </div>
            <div class="input">
                <span>Price</span>
                <span>$49</span>
            </div>
            <div class="input">
                <span>Created</span>
                <span> Oct3,2025 / 2:14 PM </span>
            </div>
            <p>You will be notified when the teacher accepts your request. You can cancel any time before approval.
            </p>
        </div>
        <div class="options">
            <div class="para">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="#808080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-info-icon lucide-info">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 16v-4" />
                    <path d="M12 8h.01" />
                </svg>
                <p>Actions become available based on the current state.</p>
            </div>

            <div class="buttons">
                <button class="cancel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="#931414" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-x-icon lucide-x">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>  Cancel
                </button>
                <button class="pay">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-credit-card-icon lucide-credit-card">
                        <rect width="20" height="14" x="2" y="5" rx="2" />
                        <line x1="2" x2="22" y1="10" y2="10" />
                    </svg>  Pay
                </button>
            </div>
        </div>
    </div>
    
    <script src="/assets/js/requestDetails.js"></script>
    <script src="/assets/js/learn.js"></script>
</body>

</html>
