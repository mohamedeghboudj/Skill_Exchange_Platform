 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Course</title>
    <link rel="stylesheet" href="styles/rateCourse.css">
</head>
<body>
    <!-- Overlay -->
    <div class="overlay">
        <!-- Rating Card -->
        <div class="rate-page">
            <h2 id="course-title">Rate this course</h2>
            
            <!-- Stars Container -->
            <div class="container">
                <div class="star-border">
                    <svg class="star" data-rating="1" viewBox="0 0 24 24" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
                <div class="star-border">
                    <svg class="star" data-rating="2" viewBox="0 0 24 24" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
                <div class="star-border">
                    <svg class="star" data-rating="3" viewBox="0 0 24 24" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
                <div class="star-border">
                    <svg class="star" data-rating="4" viewBox="0 0 24 24" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
                <div class="star-border">
                    <svg class="star" data-rating="5" viewBox="0 0 24 24" stroke-width="1.5">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script src="js/rateCourse.js"></script>
</body>
</html>
