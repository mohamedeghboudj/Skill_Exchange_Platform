    <main>


        <div class="header">
            <h1 class="mainHeading"> Your profile</h1>
            <form action="editProfile.htm" class="go-to-edit"  method="get">
                <button class="edit"> <i data-lucide="pencil-line" class="edit-icon"></i> Edit</button>
            </form>
        </div>

        <div class="profile">
            <figure>

                <img class="profile-pic" src="images/profilePicture1.jpg" alt="profile picture"
                    title="your profile picture" />
                <div class="user-mode">
                    <div class="student-mode">Student</div>
                    <div class="teacher-mode">Teacher</div>
                    <p> Manage you public profile details</p>
                </div>

            </figure>


            <form action="EditProfile.htm" method="post">
                <div class="personalInfo">
                    <div class="form-input">
                        <label for="FullnameV">Full name</label>
                        <input type="text" id="FullnameV" value="" readonly />
                    </div>
                    <div>
                        <label for="emailV">Email</label>
                        <input type="email" id="emailV" value=" " readonly />
                    </div>



                    <div>
                        <label for="skillV"> Skill</label>
                        <input type="text" id="skillV" readonly value="" />
                    </div>
                    <div> <label for="AgeV"> Age</label>
                        <input id="AgeV" value="" readonly />
                    </div>
                </div>
                <div class="bio-section">

                    <label class="bioV" for="bioV">Bio</label>
                    <textarea id="bioV" name="bio" rows="5" readonly> 

                    <label class="bioV" for="BioV">Bio</label>
                    <textarea id="bioV" name="bio" rows="5" readonly>

                    </textarea>
                </div>
            </form>
        </div>

        <div class="p-terms-align">
            <h4>Privacy terms</h4>
        </div>
        <div class="privacy-terms">
            <p>By continuing, you agree to our privacy policy and data processing</p>
            <form action="privacyTerms.htm" target="_blank" method="get"><button class="view-privacy-terms">privacy
                    terms</button>
            </form>
        </div>
        <div class="certificates-align">
            <h4>Certificates</h4>
        </div>

        <div class="certificate-section ">
            <div class="certificate">
                <!-- <a href="#popup1" class="certificate-object">

                    <div>

                        <p> Google Professional Cloud Dev</p>
                    </div>

                    <button class="Remove" id="remove" action="">Remove</button>

                </a>
            </div>


            <label for="Certificate" class="Upload-button">Add certificate (PDF,PNG,JPG)</label>
            <input type="file" id="Certificate" style="display:none;" name="certificate" accept="image/*">

            <dialog id="popup"
                style="width:  500px; height: 551px; border: none; scrollbar-width: none; border-radius: 15px; padding: 0;margin: auto;">
                <iframe src="/removeCertificate.htm" frameborder="0"
                    style="width: 100%; height: 100%; border: none; border-radius:15px; margin: auto;"></iframe>
            </dialog>


        </div>
        <br>
        <p class="note">Certificates are optional.You can add them anytime</p>
        <br>
