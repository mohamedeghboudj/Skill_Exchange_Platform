<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="images/logo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/other.css">
    <link rel="stylesheet" href="/assets/css/main.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="../assets/images/logo-removebg-preview.png" alt="learn-land" width="60px" height="50">
                <h3>LearnLand</h3>
            </div>
            <ul>
                <li><a href="/index.html">About</a></li>
                <li><a href="/pages/home.html">Home</a></li>
                <li><a href="/html/teach.html">Teach</a></li>
                <li><a href="/html/learn.html">Learn</a></li>
                <li><a href="/profile.htm">Profile</a></li>
                <button><a href="/index.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-log-out-icon lucide-log-out">
                            <path d="m16 17 5-5-5-5" />
                            <path d="M21 12H9" />
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        </svg>Logout</a></button>
            </ul>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="menuIcon">
                <path d="M4 5h16" />
                <path d="M4 12h16" />
                <path d="M4 19h16" />
            </svg>
        </nav>
        <div class="navigation">
            <a href="/index.html">About</a>
            <hr>
            <a href="/pages/home.html">Home</a>
            <hr>
            <a href="/html/teach.html">Teach</a>
            <hr>
            <a href="/html/learn.html">Learn</a>
            <hr>
            <a href="/profile.htm">Profile</a>
            <hr>
            <a href="/auth.html">LogOut</a>
        </div>
    </header>

    <main>




        <div class="profile">
            <figure>

                <img class="profile-pic" src="images1/profilePicture1.jpg" alt="profile picture"
                    title="your profile picture" />
                <div class="user-mode">
                    
                    <div class="teacher-mode">Teacher</div>
                  
                </div>

            </figure>


            <form action="EditProfile.htm" method="post">
                <div class="personalInfo">
                    <div class="form-input">
                        <label for="FullnameV">Full name</label>
                        <input type="text" id="FullnameV" value="Full name: Alex Johnson" readonly />
                    </div>
                    <div>
                        <label for="emailV">Email</label>
                        <input type="email" id="emailV" value=" alex.johnson@example.com" readonly />
                    </div>



                    <div>
                        <label for="Skill"> Skill</label>
                        <input type="text" id="SkillV" readonly value="Web Development, JavaScript, React" />
                    </div>
                    <div> <label for="AgeV"> Age</label>
                        <input id="AgeV" value="34" readonly />
                    </div>
                </div>
                <div class="bio-section">
                    <label class="bioV" for="BioV">Bio</label>
                    <textarea id="BioV" name="bio" rows="5" readonly> Front-end developer and part-time mentor. Passionate about building accessible web apps and helping students grow their JavaScript skills.
                    </textarea>
                </div>
            </form>
        </div>

        <div class="certificates-align">
            <h4>Certificates</h4>
        </div>

        <div class="certificate-section ">
            <div class="certificate">
                <a href="#popup1" class="certificate-object">
                    <div>
                        <i class="spreadsheet" data-lucide="file-spreadsheet"></i>
                        <p> Google Professional Cloud Dev</p>
                    </div>



                    <button class="Remove" action="">Remove</button>


                </a>
                <a href="#popup1" class="certificate-object" id="modal1">
                    <div>
                        <i class="spreadsheet" data-lucide="file-spreadsheet"></i>
                        <p> Google Professional Cloud Dev</p>
                    </div>
                    <form action="removeCertificate.htm" method="get">
                        <button class="Remove" action="">Remove</button>
                    </form>
                </a>
            </div>


          




        </div>
        <br>
        <p class="note">Certificates are optional.You can add them anytime</p>
        <br>

    </main>
    <div class="popup" id="popup1">
        <a href="#" class="close-popup"> <i class="x-icon" data-lucide="x"></i></a>
        <div class="inner-popup">

            <img src="images/certificate.png" />

        </div>
    </div>

    <script class="image1" src="https://unpkg.com/lucide"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="js/profile.js"></script>
</body>

</body>

</html>
